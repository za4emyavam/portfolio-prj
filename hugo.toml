baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'My New Hugo Site'

theme = "github.com/panr/hugo-theme-terminal"

[[module.imports]]
  path = "github.com/panr/hugo-theme-terminal"

[params]
  themeColor = "green"
  fullWidthTheme = true
  centerTheme = true
  
  [params.terminal]
    contentTypeName = "posts"
    showTerminalHeader = true
    terminalTitle = "my-portfolio ~ $"
