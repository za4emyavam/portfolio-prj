name: Deploy Portfolio
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
        
      - name: Build site
        run: hugo -b "https://za4emyavam.com/"

      - name: Zip Artifact
        run: cd public && zip -r ../site.zip *

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Upload to S3
        run: aws s3 cp site.zip s3://portfolio-prj-artifact-bucket/artifacts/site.zip

      - name: Trigger EC2 Update via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=portfolio-web-instance" \
            --parameters 'commands=["/usr/local/bin/deploy.sh"]' \
            --query "Command.CommandId" \
            --output text)
          
          echo "SSM Command sent"
    