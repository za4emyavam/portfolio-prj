<div class="profile-header">
    <div class="photo-container">
        <img src="{{ .Get "img" }}" alt="Profile Photo" class="profile-photo">
    </div>
    <div class="profile-info">
        <h1 class="profile-name">{{ .Get "name" }}</h1>
        <p class="profile-title">{{ .Get "title" }}</p>
    </div> 
</div>
