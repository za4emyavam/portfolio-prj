<style>
  .custom-terminal-nav {
    display: flex;
    gap: 15px;
    margin-left: 20px;
    z-index: 10;
  }
  .cmd-btn {
    display: inline-block;
    padding: 2px 10px;
    color: var(--accent);
    border: 2px solid var(--accent);
    text-decoration: none;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.2s ease;
  }

  .cmd-btn:hover {
    background-color: var(--accent);
    color: var(--background);
  }

  .custom-lang-switcher {
    display: flex;
    gap: 10px;
  }

  .lang-btn {
    display: inline-block;
    padding: 2px 8px;
    font-size: 0.85rem;
    color: var(--background);
    background-color: var(--accent);
    text-decoration: none;
    font-weight: bold;
    border-radius: 3px;
    transition: opacity 0.2s;
  }

  .lang-btn:hover {
    opacity: 0.8;
  }
</style>

<header class="header">
  <div class="header__inner" style="align-items: center;">
    <div class="header__logo">
      {{ partial "logo.html" . }}
    </div>

    <nav class="custom-terminal-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}" class="cmd-btn">{{ .Name }}</a>
      {{ end }}
      {{ if .IsTranslated }}
      <div class="custom-lang-switcher">
        {{ range .Translations }}
          <a href="{{ .Permalink }}" class="cmd-btn">{{ .Language.LanguageName }}</a>
        {{ end }}
      </div>
    {{ end }}
    </nav>
  </div>

  </header>
